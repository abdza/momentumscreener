<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {

}

.ticker-row:hover { background: #161b22; }
.ticker-row.muted { opacity: 0.35; }

.solo-btn {
  flex-shrink: 0;

.dot {
  width: 9px; height: 9px;

}

.ticker-info { flex: 1; min-width: 0; }

.ticker-name {

  color: #e6edf3;

.ticker-sector {

}

.change-pct { font-size: 12px; font-weight: 600; }

.green { color: #3fb950; }

@media (max-width: 640px) {
  body {
    height: auto;
    overflow: auto;

    gap: 8px;

  }

  h1 { font-size: 13px; }

  .controls {
    margin-left: 0;
    width: 100%;
    gap: 6px;
    flex-wrap: wrap;
  }

  .mode-btn {
    padding: 5px 8px;
    font-size: 11px;
  }

  .main {
    grid-template-columns: 1fr;
    grid-template-rows: 55vw auto;
    height: auto;
    overflow: visible;
  }

  .chart-area {
    height: 55vw;
    min-height: 220px;
    padding: 8px 8px 6px;
  }

  .sidebar {
    border-left: none;
    border-top: 1px solid #30363d;
    max-height: 50vh;
  }

  .status {
    font-size: 10px;
    bottom: 6px;
    right: 8px;
  }
}
</style>

<body>

<div class="header">
  <h1>🌅 Premarket Volume Tracker</h1>
  <div class="controls">
    <div class="mode-toggle">
      <button class="mode-btn" id="btnVolume" onclick="setMode('volume')">Volume</button>
      <button class="mode-btn" id="btnVolPct" onclick="setMode('volpct')">Vol %</button>
      <button class="mode-btn" id="btnRank" onclick="setMode('rank')">Rank</button>
      <button class="mode-btn active" id="btnChange" onclick="setMode('change')">Change %</button>
    </div>
    <button class="mode-btn active" id="btnSignals" onclick="toggleSignals()" style="border:1px solid #9e7c00;border-radius:6px;background:#3d2e00;color:#ffd700;">⚡ Signals</button>
    <button class="mode-btn active" id="btnCandleSpikes" onclick="toggleCandleSpikes()" style="border:1px solid #9e3300;border-radius:6px;background:#3d1400;color:#ff7b3d;">🕯️ Spikes</button>
    <label>Top</label>
    <input type="number" id="topN" value="10" min="1" max="100" onchange="onTopNChange()">
    <label>tickers</label>
    <input type="date" id="dateSelect" onchange="onDateChange()">
  </div>
</div>

<div class="main">
  <div class="chart-area">
    <canvas id="chart"></canvas>
    <div class="status" id="status">Loading…</div>
  </div>
  <div class="sidebar">
    <div class="sidebar-head">
      Consistency Rankings
      <select class="sort-select" id="rankSort" onchange="onSortChange()">
        <option value="pct">Consistency %</option>
        <option value="avgRank">Avg Rank</option>
        <option value="latestVol">Latest Vol</option>
        <option value="latestChange" selected>Latest Change</option>
        <option value="count">Appearances</option>
      </select>
      <button class="show-all-btn" onclick="showAllTickers()">Show All</button>
    </div>
    <div class="ticker-list" id="tickerList"></div>
  </div>
</div>

<script>
const COLORS = [
  '#36A2EB','#FF6384','#FFCE56','#4BC0C0','#9966FF',
  '#FF9F40','#00D4AA','#58A6FF','#F08030','#E74C3C',
  '#2ECC71','#F39C12','#9B59B6','#1ABC9C','#E67E22',
  '#E91E63','#00BCD4','#8BC34A','#FF5722','#607D8B'
];

let chart = null;
let snapshots = [];
let hidden = new Set();
let mode = 'change';
let currentDate = '';
let lastCount = 0;
let pollTimer = null;
let rankCache = [];
let rankSort = 'latestChange';
let signalCache = {};
let showSignals = true;
let candleSpikeCache = {};
let showCandleSpikes = true;
let accelCache = {};

// ── Entry-signal detection ────────────────────────────────────────────────────
// Rule (from analyze_pretop20_peaks.py): once a ticker is first seen with a
// gain >= 5%, watch its next 15 observations. Signal fires if price ended the
// window higher, rose in at least half the minutes, and volume accelerated
// (2nd half of window traded more than the 1st half).
const SIG_WINDOW = 15;
const SIG_MIN_CHG = 5;

function calcSignals(snaps) {
  const series = {};
  snaps.forEach((snap, si) => {
    snap.data.forEach(item => {
      const chg = pmChange(item);
      if (typeof chg !== 'number') return;
      (series[item.name] = series[item.name] || []).push({
        si,
        chg,
        vol: item.premarket_volume || 0
      });
    });
  });

  const signals = {};
  for (const [name, obs] of Object.entries(series)) {
    const start = obs.findIndex(o => o.chg >= SIG_MIN_CHG);
    if (start === -1) continue;
    const w = obs.slice(start, start + SIG_WINDOW);
    if (w.length < SIG_WINDOW) continue;
    if (new Set(w.map(o => o.chg)).size < 3) continue; // frozen/stale quote

    const price = w.map(o => 1 + o.chg / 100);
    let ups = 0, volFirst = 0, volSecond = 0;
    const half = Math.floor((w.length - 1) / 2);
    for (let i = 1; i < w.length; i++) {
      if (price[i] > price[i - 1]) ups++;
      const dv = Math.max(0, w[i].vol - w[i - 1].vol);
      if (i - 1 < half) volFirst += dv; else volSecond += dv;
    }
    const winGain = price[price.length - 1] / price[0] - 1;
    const upRatio = ups / (w.length - 1);
    const volAccel = volFirst > 0 ? volSecond / volFirst : 0;

    if (winGain > 0 && upRatio >= 0.5 && volAccel > 1) {
      signals[name] = { si: w[w.length - 1].si, winGain, upRatio, volAccel };
    }
  }
  return signals;
}

function toggleSignals() {
  showSignals = !showSignals;
  document.getElementById('btnSignals').classList.toggle('active', showSignals);
  rebuild();
}

// ── Candle-spike detection ──────────────────────────────────────────────────
// The backend (premarket_top20_monitor.py) flags a ticker's 'candle_spike_ratio'
// when its latest 10-min premarket candle range (high-low) is >=3x the average
// of its prior candles — an early volatility signal, independent of the
// consistency/entry-signal logic above. We mark the first snapshot it appears in.
function calcCandleSpikes(snaps) {
  const spikes = {};
  snaps.forEach((snap, si) => {
    snap.data.forEach(item => {
      if (typeof item.candle_spike_ratio !== 'number') return;
      if (!spikes[item.name]) {
        spikes[item.name] = { si, ratio: item.candle_spike_ratio };
      }
    });
  });
  return spikes;
}

function toggleCandleSpikes() {
  showCandleSpikes = !showCandleSpikes;
  document.getElementById('btnCandleSpikes').classList.toggle('active', showCandleSpikes);
  rebuild();
}

// ── Acceleration (sudden incline) detection ─────────────────────────────────
// Compares the ticker's last two premarket-change readings against the pair
// before that. If the most recent jump is much bigger than the previous one
// (or the previous move was flat/falling and this one isn't), the move just
// went from a gentle slope to an obvious incline — flag it. Recomputed from
// scratch on every rebuild, so the mark only shows while the *latest* reading
// is the one driving it; it drops off on its own once the ticker levels out.
const ACCEL_MIN_JUMP = 1.5;   // minimum pp jump between the last two readings
const ACCEL_FACTOR = 2.5;     // latest jump must be this many times the prior jump

function calcAccel(snaps) {
  const series = {};
  snaps.forEach((snap, si) => {
    snap.data.forEach(item => {
      const chg = pmChange(item);
      if (typeof chg !== 'number') return;
      (series[item.name] = series[item.name] || []).push({ si, chg });
    });
  });

  const accel = {};
  for (const [name, obs] of Object.entries(series)) {
    if (obs.length < 3) continue;
    const [a, b, c] = obs.slice(-3);
    const prevDiff = b.chg - a.chg;
    const lastDiff = c.chg - b.chg;
    if (lastDiff < ACCEL_MIN_JUMP) continue;
    const isAccel = prevDiff <= 0 ? true : lastDiff >= prevDiff * ACCEL_FACTOR;
    if (isAccel) accel[name] = { si: c.si, lastDiff, prevDiff };
  }
  return accel;
}

// ── Helpers ──────────────────────────────────────────────────────────────────

function todayStr() {
  return new Date().toISOString().slice(0,10).replace(/-/g,'');
}

function fmtDate(d) {
  return `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
}

function fmtVol(v) {
  if (v >= 1e6) return (v/1e6).toFixed(2)+'M';
  if (v >= 1e3) return (v/1e3).toFixed(1)+'K';
  return v.toString();
}

function getTopN() {
  return Math.max(1, Math.min(20, parseInt(document.getElementById('topN').value) || 10));
}

// TradingView's premarket_change is ~15min delayed for this account (see
// premarket_top20_monitor.py); alpaca_premarket_change is computed live from
// Alpaca quotes each scan (current alpaca_price vs. alpaca_previous_close,
// entirely from Alpaca — see _update_prices_with_alpaca), so prefer it
// whenever it's present.
function pmChange(item) {
  return typeof item.alpaca_premarket_change === 'number' ? item.alpaca_premarket_change : item.premarket_change;
}

function pmPrice(item) {
  return typeof item.alpaca_price === 'number' ? item.alpaca_price : null;
}

// "Close" here means prior session's close — the baseline the premarket %
// change is measured against. Prefer Alpaca's live-fetched value.
function pmPrevClose(item) {
  return typeof item.alpaca_previous_close === 'number' ? item.alpaca_previous_close : item.close;
}

// ── API ───────────────────────────────────────────────────────────────────────

async function apiFetch(url) {
  const r = await fetch(url);
  return r.json();
}

// ── Consistency calc ──────────────────────────────────────────────────────────

function calcConsistency(snaps) {
  if (!snaps.length) return [];
  const total = snaps.length;
  const map = {};

  snaps.forEach(snap => {
    snap.data.forEach((item, i) => {
      const n = item.name;
      if (!map[n]) {
        map[n] = {
          name: n,
          sector: item.sector || '',
          exchange: item.exchange || '',
          count: 0,
          rankSum: 0,
          maxVol: 0,
          latestVol: 0,
          latestChange: 0,
          latestRank: null
        };
      }
      map[n].count++;
      map[n].rankSum += (i + 1);
      if (item.premarket_volume > map[n].maxVol) map[n].maxVol = item.premarket_volume;
    });
  });

  const last = snaps[snaps.length - 1];
  if (last) {
    last.data.forEach((item, i) => {
      if (map[item.name]) {
        map[item.name].latestVol = item.premarket_volume;
        map[item.name].latestChange = pmChange(item);
        map[item.name].latestRank = i + 1;
      }
    });
  }

  return Object.values(map)
    .map(t => ({
      ...t,
      avgRank: t.rankSum / t.count,
      pct: t.count / total
    }));
}

function sortRankCache() {
  rankCache.sort((a, b) => {
    switch (rankSort) {
      case 'avgRank':      return a.avgRank - b.avgRank;
      case 'latestVol':    return b.latestVol - a.latestVol;
      case 'latestChange': return b.latestChange - a.latestChange;
      case 'count':        return b.count - a.count;
      default:             return b.pct - a.pct || a.avgRank - b.avgRank;
    }
  });
}

// ── Persisted manual hide/show overrides ────────────────────────────────────
// Clicking a ticker to hide/show it is a manual override on top of the
// topN-based default. Persisted per trading date so it survives the page's
// auto-refresh but doesn't bleed into the next trading day.
function hiddenStorageKey() {
  return `pretop20_hidden_${currentDate}`;
}

function loadHiddenOverrides() {
  try {
    const raw = localStorage.getItem(hiddenStorageKey());
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}

function setHiddenOverride(name, isHidden) {
  try {
    const overrides = loadHiddenOverrides();
    overrides[name] = isHidden;
    localStorage.setItem(hiddenStorageKey(), JSON.stringify(overrides));
  } catch (e) {}
}

function clearHiddenOverrides() {
  try { localStorage.removeItem(hiddenStorageKey()); } catch (e) {}
}

function applyHiddenOverrides() {
  const overrides = loadHiddenOverrides();
  Object.entries(overrides).forEach(([name, isHidden]) => {
    if (isHidden) hidden.add(name);
    else hidden.delete(name);
  });
}

function resetHidden() {
  const topN = getTopN();
  hidden.clear();
  rankCache.forEach((t, i) => {
    if (i >= topN) hidden.add(t.name);
  });
  applyHiddenOverrides();
  soloedName = null;
  preSoloHidden = null;
}

// ── Chart ─────────────────────────────────────────────────────────────────────

function snapVolTotals() {
  return snapshots.map(snap => snap.data.reduce((s, d) => s + d.premarket_volume, 0));
}

function tickerDataset(t, color, snapTotals) {
  const data = snapshots.map((snap, si) => {
    const idx = snap.data.findIndex(d => d.name === t.name);
    if (idx === -1) return { x: snap.timestamp, y: null };
    const vol = snap.data[idx].premarket_volume;
    let y;
    if (mode === 'volume') y = vol;
    else if (mode === 'volpct') y = snapTotals[si] > 0 ? (vol / snapTotals[si]) * 100 : null;
    else if (mode === 'change') y = pmChange(snap.data[idx]);
    else y = idx + 1; // rank
    return { x: snap.timestamp, y };
  });
  const pointRadii = snapshots.map((snap, si) => {
    const idx = snap.data.findIndex(d => d.name === t.name);
    if (idx === -1) return 2;
    const total = snapTotals[si];
    if (!total) return 2;
    const volPct = snap.data[idx].premarket_volume / total * 100;
    return Math.max(2, volPct * 0.5);
  });
  return {
    label: t.name,
    data,
    borderColor: color,
    backgroundColor: color + '18',
    borderWidth: 1.8,
    pointRadius: pointRadii,
    pointHoverRadius: 7,
    tension: 0.25,
    spanGaps: false,
    hidden: false
  };
}

function buildDatasets() {
  const shown = rankCache.filter(t => !hidden.has(t.name));

  // Pre-compute total volume per snapshot for vol% sizing and vol% mode
  const snapTotals = snapVolTotals();

  const datasets = shown.map((t, i) => tickerDataset(t, COLORS[i % COLORS.length], snapTotals));

  if (showSignals) {
    const shownNames = new Set(shown.map(t => t.name));
    const pts = [];
    for (const [name, sig] of Object.entries(signalCache)) {
      if (!shownNames.has(name)) continue;
      const snap = snapshots[sig.si];
      if (!snap) continue;
      const idx = snap.data.findIndex(d => d.name === name);
      if (idx === -1) continue;
      const vol = snap.data[idx].premarket_volume;
      let y;
      if (mode === 'volume') y = vol;
      else if (mode === 'volpct') y = snapTotals[sig.si] > 0 ? vol / snapTotals[sig.si] * 100 : null;
      else if (mode === 'change') y = pmChange(snap.data[idx]);
      else y = idx + 1;
      pts.push({ x: snap.timestamp, y, ticker: name, sig });
    }
    if (pts.length) {
      datasets.push({
        label: '⚡ signals',
        signal: true,
        type: 'scatter',
        data: pts,
        pointStyle: 'star',
        pointRadius: 11,
        pointHoverRadius: 14,
        borderColor: '#ffd700',
        backgroundColor: '#ffd700',
        borderWidth: 3,
        showLine: false,
        order: -1
      });
    }
  }

  if (showCandleSpikes) {
    const shownNames = new Set(shown.map(t => t.name));
    const pts = [];
    for (const [name, spike] of Object.entries(candleSpikeCache)) {
      if (!shownNames.has(name)) continue;
      const snap = snapshots[spike.si];
      if (!snap) continue;
      const idx = snap.data.findIndex(d => d.name === name);
      if (idx === -1) continue;
      const vol = snap.data[idx].premarket_volume;
      let y;
      if (mode === 'volume') y = vol;
      else if (mode === 'volpct') y = snapTotals[spike.si] > 0 ? vol / snapTotals[spike.si] * 100 : null;
      else if (mode === 'change') y = pmChange(snap.data[idx]);
      else y = idx + 1;
      pts.push({ x: snap.timestamp, y, ticker: name, spike });
    }
    if (pts.length) {
      datasets.push({
        label: '🕯️ candle spikes',
        candleSpike: true,
        type: 'scatter',
        data: pts,
        pointStyle: 'triangle',
        pointRadius: 11,
        pointHoverRadius: 14,
        borderColor: '#ff7b3d',
        backgroundColor: '#ff7b3d',
        borderWidth: 3,
        showLine: false,
        order: -1
      });
    }
  }

  return datasets;
}

function yAxisConfig() {
  if (mode === 'volume') {
    return {
      type: 'logarithmic',
      title: { display: true, text: 'Premarket Volume', color: '#6e7681', font: { size: 11 } },
      grid: { color: '#1c2128' },
      ticks: { color: '#6e7681', font: { size: 11 }, callback: v => fmtVol(v) }
    };
  }
  if (mode === 'volpct') {
    return {
      type: 'linear',
      min: 0,
      title: { display: true, text: 'Share of Total Vol (%)', color: '#6e7681', font: { size: 11 } },
      grid: { color: '#1c2128' },
      ticks: { color: '#6e7681', font: { size: 11 }, callback: v => v.toFixed(1) + '%' }
    };
  }
  if (mode === 'change') {
    return {
      type: 'linear',
      title: { display: true, text: 'Premarket Change (%)', color: '#6e7681', font: { size: 11 } },
      grid: { color: '#1c2128' },
      ticks: {
        color: '#6e7681',
        font: { size: 11 },
        callback: v => (v >= 0 ? '+' : '') + v.toFixed(2) + '%'
      }
    };
  }
  return {
    type: 'linear',
    reverse: true,
    min: 1,
    max: 20,
    title: { display: true, text: 'Rank (1 = highest volume)', color: '#6e7681', font: { size: 11 } },
    grid: { color: '#1c2128' },
    ticks: {
      color: '#6e7681',
      font: { size: 11 },
      stepSize: 1,
      callback: v => Number.isInteger(v) ? `#${v}` : ''
    }
  };
}

function rebuild() {
  if (!snapshots.length) return;
  const datasets = buildDatasets();

  if (chart) { chart.destroy(); chart = null; }

  const ctx = document.getElementById('chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 250 },
      interaction: { mode: 'nearest', intersect: true },
      onClick: (event, elements) => {
        if (!elements.length) return;
        const ds = chart.data.datasets[elements[0].datasetIndex];
        const ticker = (ds.signal || ds.candleSpike) ? ds.data[elements[0].index].ticker : ds.label;
        window.open(`https://www.tradingview.com/chart/?symbol=${encodeURIComponent(ticker)}`, '_blank');
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#161b22',
          borderColor: '#30363d',
          borderWidth: 1,
          titleColor: '#58a6ff',
          bodyColor: '#c9d1d9',
          padding: 12,
          displayColors: false,
          callbacks: {
            title: items => {
              if (!items.length) return '';
              const item = items[0];
              const ticker = (item.dataset.signal || item.dataset.candleSpike) ? item.raw.ticker : item.dataset.label;
              const time = new Date(item.raw.x).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
              if (item.dataset.signal) return `⚡ ${ticker}  ·  ENTRY SIGNAL  ·  ${time}`;
              if (item.dataset.candleSpike) return `🕯️ ${ticker}  ·  CANDLE SPIKE  ·  ${time}`;
              return `${ticker}  ·  ${time}`;
            },
            label: item => {
              if (item.dataset.signal) {
                const s = item.raw.sig;
                return [
                  ` Rising in ${(s.upRatio * 100).toFixed(0)}% of first ${SIG_WINDOW} min`,
                  ` Window gain : +${(s.winGain * 100).toFixed(1)}%`,
                  ` Vol accel   : ${s.volAccel.toFixed(2)}x`,
                  ` (peaks usually ~15-20 min after signal)`,
                ];
              }
              if (item.dataset.candleSpike) {
                const s = item.raw.spike;
                return [
                  ` Latest 10-min range : ${s.ratio}x the recent average`,
                  ` (fires before volume/change rank would catch it)`,
                ];
              }
              const snap = snapshots[item.dataIndex];
              if (!snap) return [];
              const ticker = item.dataset.label;
              const entry = snap.data.find(d => d.name === ticker);
              if (!entry) return [];
              const rank = snap.data.indexOf(entry) + 1;
              const totalVol = snap.data.reduce((s, d) => s + d.premarket_volume, 0);
              const pct = totalVol > 0 ? (entry.premarket_volume / totalVol * 100).toFixed(2) : '—';
              const chg = pmChange(entry);
              const chgStr = (chg >= 0 ? '+' : '') + chg.toFixed(2) + '%';
              const price = pmPrice(entry);
              const prevClose = pmPrevClose(entry);
              const lines = [];
              if (price !== null) lines.push(` Price      : $${price.toFixed(4)}`);
              if (prevClose !== null) lines.push(` Prev Close : $${prevClose.toFixed(4)}`);
              lines.push(
                ` Volume : ${fmtVol(entry.premarket_volume)} (${entry.premarket_volume.toLocaleString()})`,
                ` Vol %  : ${pct}% of total`,
                ` Change : ${chgStr}`,
                ` Rank   : #${rank}`,
                ` Sector : ${entry.sector || '—'}`,
              );
              return lines;
            }
          }
        }
      },
      scales: {
        x: {
          type: 'time',
          time: {
            tooltipFormat: 'HH:mm',
            displayFormats: { minute: 'HH:mm', hour: 'HH:mm' }
          },
          grid: { color: '#1c2128' },
          ticks: { color: '#6e7681', font: { size: 11 }, maxTicksLimit: 12 }
        },
        y: yAxisConfig()
      }
    }
  });

  applyHoverSolo();
}

// ── Sidebar ───────────────────────────────────────────────────────────────────

function renderSidebar() {
  const list = document.getElementById('tickerList');

  if (!rankCache.length) {
    list.innerHTML = '<div class="empty-msg">No data for this date.</div>';
    return;
  }

  const maxCount = rankCache[0]?.count || 1;

  // Build color map: assign colors in order of visible tickers
  const colorMap = {};
  let colorIdx = 0;
  rankCache.forEach(t => {
    if (!hidden.has(t.name)) colorMap[t.name] = COLORS[colorIdx++ % COLORS.length];
  });

  list.innerHTML = rankCache.map((t, i) => {
    const inChart = !hidden.has(t.name);
    const color = inChart ? colorMap[t.name] : '#444';
    const isMuted = !inChart;
    const chg = t.latestChange;
    const chgClass = chg > 0 ? 'green' : chg < 0 ? 'red' : 'gray';
    const chgStr = chg !== 0
      ? (chg > 0 ? '+' : '') + chg.toFixed(2) + '%'
      : '0.00%';
    const barWidth = ((t.count / maxCount) * 100).toFixed(1);
    const rankLabel = t.latestRank ? `#${t.latestRank} now` : 'not in last';
    const sig = signalCache[t.name];
    const sigTime = sig && snapshots[sig.si]
      ? new Date(snapshots[sig.si].timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      : '';
    const sigBadge = sig ? `<span class="sig-badge" title="Entry signal: rising + accelerating volume">⚡ ${sigTime}</span>` : '';
    const spike = candleSpikeCache[t.name];
    const spikeTime = spike && snapshots[spike.si]
      ? new Date(snapshots[spike.si].timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      : '';
    const spikeBadge = spike ? `<span class="spike-badge" title="Candle spike: ${spike.ratio}x recent 10-min range">🕯️ ${spikeTime}</span>` : '';
    const accel = accelCache[t.name];
    const accelBadge = accel ? `<span class="accel-badge" title="Accelerating: latest move +${accel.lastDiff.toFixed(2)}pp vs +${accel.prevDiff.toFixed(2)}pp before">🚀 surge</span>` : '';

    return `
    <div class="ticker-row${isMuted ? ' muted' : ''}" onclick="toggleTicker('${t.name}')" onmouseenter="hoverSolo('${t.name}')" onmouseleave="hoverSoloEnd()">
      <div class="dot" style="background:${color}"></div>
      <div class="ticker-info">
        <div class="ticker-name">${t.name}${sigBadge}${spikeBadge}${accelBadge}</div>
        <div class="ticker-sector">${t.sector}</div>
        <div class="consistency-bar">
          <div class="consistency-fill" style="width:${barWidth}%;background:${color}"></div>
        </div>
      </div>
      <div class="ticker-meta">
        <div class="change-pct ${chgClass}">${chgStr}</div>
        <div class="meta-sub">${t.count}/${snapshots.length} snaps</div>
        <div class="meta-sub">avg #${t.avgRank.toFixed(1)}</div>
      </div>
      <button class="solo-btn${t.name === soloedName ? ' active' : ''}" title="Show only this ticker" onclick="soloTicker(event, '${t.name}')">1</button>
    </div>`;
  }).join('');
}

// ── Status bar ────────────────────────────────────────────────────────────────

function updateStatus() {
  const el = document.getElementById('status');
  const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const isToday = currentDate === todayStr();
  const dot = isToday ? '<span class="live-dot"></span>' : '';
  el.innerHTML = `${dot}${isToday ? 'Live · ' : ''}Updated ${now} · ${snapshots.length} snapshots`;
}

// ── Polling ───────────────────────────────────────────────────────────────────

function startPolling() {
  stopPolling();
  pollTimer = setInterval(async () => {
    const today = todayStr();
    if (currentDate !== today) return;
    const res = await apiFetch(`/pretop20/api/latest?date=${today}`);
    if (res.count > lastCount) {
      lastCount = res.count;
      const data = await apiFetch(`/pretop20/api/data?date=${today}`);
      snapshots = data;
      rankCache = calcConsistency(snapshots);
      signalCache = calcSignals(snapshots);
      candleSpikeCache = calcCandleSpikes(snapshots);
      accelCache = calcAccel(snapshots);
      sortRankCache();
      rebuild();
      renderSidebar();
    }
    updateStatus();
  }, 30000);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

// ── Event handlers ────────────────────────────────────────────────────────────

function toggleTicker(name) {
  // A plain row click while soloed breaks the solo's all-but-one invariant,
  // so forget the solo toggle rather than let it restore a stale snapshot.
  soloedName = null;
  preSoloHidden = null;
  if (hidden.has(name)) hidden.delete(name);
  else hidden.add(name);
  setHiddenOverride(name, hidden.has(name));
  rebuild();
  renderSidebar();
}

// Soloing is a toggle: first click isolates the ticker, remembering the
// hidden-set as it stood beforehand; clicking the same ticker's solo button
// again restores exactly that prior state (not "show everything").
let soloedName = null;
let preSoloHidden = null;

function soloTicker(evt, name) {
  evt.stopPropagation();
  if (soloedName === name) {
    hidden = new Set(preSoloHidden);
    soloedName = null;
    preSoloHidden = null;
  } else {
    if (soloedName === null) preSoloHidden = new Set(hidden);
    hidden.clear();
    rankCache.forEach(t => { if (t.name !== name) hidden.add(t.name); });
    soloedName = name;
  }
  rebuild();
  renderSidebar();
}

// Hover-solo: temporarily isolate one ticker's line while the cursor is on its
// sidebar row, without touching the persistent hidden-set state.
let hoverSoloName = null;

function hoverSolo(name) {
  hoverSoloName = name;
  applyHoverSolo();
}

function applyHoverSolo() {
  if (!chart || !hoverSoloName) return;
  chart.data.datasets = chart.data.datasets.filter(ds => !ds._hoverTemp);
  const inChart = chart.data.datasets.some(ds => !ds.signal && !ds.candleSpike && ds.label === hoverSoloName);
  if (!inChart) {
    // Muted ticker: build a temporary dataset so it can be previewed
    const t = rankCache.find(r => r.name === hoverSoloName);
    if (t) {
      const ds = tickerDataset(t, '#58a6ff', snapVolTotals());
      ds._hoverTemp = true;
      chart.data.datasets.push(ds);
    }
  }
  chart.data.datasets.forEach(ds => {
    if (ds.signal || ds.candleSpike) {
      if (!ds._allData) ds._allData = ds.data;
      ds.data = ds._allData.filter(p => p.ticker === hoverSoloName);
    } else {
      ds.hidden = ds.label !== hoverSoloName;
    }
  });
  chart.update('none');
}

function hoverSoloEnd() {
  hoverSoloName = null;
  if (!chart) return;
  chart.data.datasets = chart.data.datasets.filter(ds => !ds._hoverTemp);
  chart.data.datasets.forEach(ds => {
    if (ds._allData) { ds.data = ds._allData; delete ds._allData; }
    ds.hidden = false;
  });
  chart.update('none');
}

function showAllTickers() {
  hidden.clear();
  clearHiddenOverrides();
  soloedName = null;
  preSoloHidden = null;
  rebuild();
  renderSidebar();
}

function onTopNChange() {
  resetHidden();
  rebuild();
  renderSidebar();
}

function onSortChange() {
  rankSort = document.getElementById('rankSort').value;
  sortRankCache();
  resetHidden();
  rebuild();
  renderSidebar();
}

function setMode(m) {
  mode = m;
  document.getElementById('btnVolume').classList.toggle('active', m === 'volume');
  document.getElementById('btnVolPct').classList.toggle('active', m === 'volpct');
  document.getElementById('btnRank').classList.toggle('active', m === 'rank');
  document.getElementById('btnChange').classList.toggle('active', m === 'change');
  rebuild();
}

async function onDateChange() {
  currentDate = document.getElementById('dateSelect').value.replace(/-/g, '');
  const data = await apiFetch(`/pretop20/api/data?date=${currentDate}`);
  snapshots = data;
  lastCount = data.length;
  rankCache = calcConsistency(snapshots);
  signalCache = calcSignals(snapshots);
  candleSpikeCache = calcCandleSpikes(snapshots);
  accelCache = calcAccel(snapshots);
  sortRankCache();
  resetHidden();
  rebuild();
  renderSidebar();
  updateStatus();
  stopPolling();
  if (currentDate === todayStr()) startPolling();
}

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  const dates = await apiFetch('/pretop20/api/dates');
  const today = todayStr();
  const sel = document.getElementById('dateSelect');

  // Set min/max so the calendar only allows dates that have data
  if (dates.length) {
    sel.min = fmtDate(dates[dates.length - 1]); // oldest
    sel.max = fmtDate(dates[0]);                 // newest
  }

  currentDate = dates.includes(today) ? today : (dates[0] || today);
  sel.value = fmtDate(currentDate);

  const data = await apiFetch(`/pretop20/api/data?date=${currentDate}`);
  snapshots = data;
  lastCount = data.length;
  rankCache = calcConsistency(snapshots);
  signalCache = calcSignals(snapshots);
  candleSpikeCache = calcCandleSpikes(snapshots);
  accelCache = calcAccel(snapshots);
  sortRankCache();
  resetHidden();
  rebuild();
  renderSidebar();
  updateStatus();

  if (currentDate === today) startPolling();

  setInterval(() => location.reload(), 120000);
}

init();
</script>
